<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ashraf Creative Studio</title>

  <link rel="stylesheet" href="style.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

  <section class="hero">

    <h1 data-aos="fade-up">Ashraf Creative Studio</h1>

    <p data-aos="fade-up" data-aos-delay="200">
      Web Design - Logo Design - Video Editing
    </p>

  </section>

  <section class="section" data-aos="fade-up">
    <h2>About</h2>
    <p>Professional designer creating modern digital experiences.</p>
  </section>

  <section class="section" data-aos="fade-up">
    <h2>Services</h2>

    <div class="grid">

      <div class="card">
        <h3>Web Design</h3>
      </div>

      <div class="card">
        <h3>Logo Design</h3>
      </div>

      <div class="card">
        <h3>Video Editing</h3>
      </div>

    </div>
  </section>

  <section class="section contact" data-aos="fade-up">

    <h2>Contact</h2>

    <form id="contactForm">

      <select id="method">
        <option value="">Contact Method</option>
        <option value="WhatsApp">WhatsApp</option>
        <option value="Email">Email</option>
      </select>

      <select id="service">
        <option value="">Service</option>
        <option value="Web Design">Web Design</option>
        <option value="Logo Design">Logo Design</option>
        <option value="Video Editing">Video Editing</option>
      </select>

      <textarea id="message" placeholder="Your message"></textarea>

      <button type="submit">Send</button>

    </form>

  </section>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>

</body>
</html>
