<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A5hraf Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
<div class="logo">A5hraf</div>
</header>

<!-- HERO ONLY -->
<section class="hero glass">
<h1 class="logo-text"></h1>
<button onclick="scrollToAbout()">Next Section ↓</button>
</section>

<!-- ABOUT -->
<section id="about" class="section glass">
<h2>About Me</h2>
<p>
I am a freelance designer specialized in modern digital design.
</p>
</section>

<!-- WORK -->
<section class="section glass">
<h2>My Work</h2>

<div class="grid">
<div class="card">Website Design</div>
<div class="card">Logo Design</div>
<div class="card">Video Editing</div>
<div class="card">QR Design</div>
</div>
</section>

<!-- TOOLS -->
<section class="section glass">
<h2>Tools</h2>

<div class="grid">
<div class="card">Canva Pro</div>
<div class="card">CapCut Pro</div>
<div class="card">VN Editor</div>
<div class="card">GitHub</div>
</div>
</section>

<!-- ORDER -->
<section class="section glass">
<h2>Order Service</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Your Name" required>

<select id="service" required>
<option value="">Choose Service</option>
<option>Web Design</option>
<option>Logo Design</option>
<option>Video Editing</option>
<option>QR Design</option>
</select>

<textarea id="desc" placeholder="Project Description" required></textarea>

<button type="submit">Send via WhatsApp</button>

</form>
</section>

<script src="script.js"></script>
</body>
</html>
