<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A5hraf Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
<div class="logo">A5hraf</div>
</header>

<!-- HERO -->
<section class="hero">
<h1 class="logo-text"></h1>
<p>Freelance Digital Studio</p>
</section>

<!-- ABOUT -->
<section class="card-section">
<h2>About Me</h2>
<p>
I create modern websites, logos, and digital content with a clean and professional style.
</p>
</section>

<!-- SERVICES -->
<section class="card-section">
<h2>Services</h2>

<div class="grid">
<div class="card">Web Design</div>
<div class="card">Logo Design</div>
<div class="card">Video Editing</div>
<div class="card">QR Design</div>
</div>
</section>

<!-- TOOLS -->
<section class="card-section">
<h2>Tools</h2>

<div class="grid">
<div class="card">Canva Pro</div>
<div class="card">CapCut</div>
<div class="card">VN Editor</div>
<div class="card">GitHub</div>
</div>
</section>

<!-- CONTACT -->
<section class="card-section">
<h2>Order Project</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Your Name" required>

<select id="service" required>
<option value="">Select Service</option>
<option>Web Design</option>
<option>Logo Design</option>
<option>Video Editing</option>
<option>QR Design</option>
</select>

<textarea id="desc" placeholder="Project Details" required></textarea>

<button type="submit">Send via WhatsApp</button>

</form>

</section>

<script src="script.js"></script>
</body>
</html>
