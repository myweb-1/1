<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Creative Studio</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<body>

<!-- LANGUAGE BUTTON -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('ar')">AR</button>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-content">
    <h1 id="title">Creative Studio</h1>

    <p id="subtitle">
      Web Design • Logo • Video Editing • QR Design
    </p>

    <a href="#contact">
      <button>Get Started</button>
    </a>
  </div>

</section>

<!-- ABOUT -->
<section class="section">
  <h2 id="aboutTitle">About</h2>
  <p id="aboutText">We create modern, clean and powerful digital experiences.</p>
</section>

<!-- SERVICES -->
<section class="section">

  <h2 id="servicesTitle">Services</h2>

  <div class="grid">

    <div class="card"><h3>Web Design</h3></div>
    <div class="card"><h3>Logo Design</h3></div>
    <div class="card"><h3>Video Editing</h3></div>
    <div class="card"><h3>QR Design</h3></div>

  </div>

</section>

<!-- CONTACT -->
<section class="section contact" id="contact">

  <h2 id="contactTitle">Contact</h2>

  <form id="contactForm">

    <input type="text" id="clientName" placeholder="Your Name" required>

    <select id="method">
      <option value="">Contact Method</option>
      <option value="WhatsApp">WhatsApp</option>
      <option value="Email">Email</option>
    </select>

    <select id="service">
      <option value="">Service</option>
      <option value="Web Design">Web Design</option>
      <option value="Logo Design">Logo Design</option>
      <option value="Video Editing">Video Editing</option>
      <option value="QR Design">QR Design</option>
    </select>

    <textarea id="message" placeholder="Your Message"></textarea>

    <button type="submit">Send</button>

  </form>

</section>

<script src="script.js"></script>

</body>
</html>
