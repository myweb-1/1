<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Studio</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <div>
    <h1 id="title">Creative Studio</h1>
    <p id="subtitle">Web Design • Logo • Video Editing • QR Design</p>
  </div>
</section>

<section class="section">
  <h2>Services</h2>

  <div class="grid">
    <div class="card"><h3>Web Design</h3></div>
    <div class="card"><h3>Logo Design</h3></div>
    <div class="card"><h3>Video Editing</h3></div>
    <div class="card"><h3>QR Design</h3></div>
  </div>
</section>

<section class="section" id="contact">
  <h2>Contact</h2>

  <form id="contactForm">

    <input type="text" id="clientName" placeholder="Name">

    <select id="method">
      <option value="">Contact Method</option>
      <option value="WhatsApp">WhatsApp</option>
      <option value="Email">Email</option>
    </select>

    <select id="service">
      <option value="">Service</option>
      <option>Web Design</option>
      <option>Logo Design</option>
      <option>Video Editing</option>
      <option>QR Design</option>
    </select>

    <textarea id="message" placeholder="Message"></textarea>

    <button type="submit">Send</button>

  </form>
</section>

<script src="script.js"></script>

</body>
</html>
